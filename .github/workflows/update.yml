name: Update tested subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: subscription-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install --requirement requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Prepare candidates
        run: python update_subscription.py prepare
      - name: Start Mihomo
        run: |
          docker pull metacubex/mihomo:v1.19.28
          docker run --detach --name mihomo --network host \
            --volume "$PWD/work:/root/.config/mihomo" \
            metacubex/mihomo:v1.19.28 \
            -d /root/.config/mihomo
      - name: Benchmark and filter nodes
        run: python update_subscription.py benchmark
      - name: Show Mihomo logs on failure
        if: failure()
        run: docker logs mihomo || true
      - name: Stop Mihomo
        if: always()
        run: docker rm --force mihomo || true
      - name: Save latest successful result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sub.txt docs/status.json
          git diff --cached --quiet || git commit -m "Update tested subscription [skip ci]"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
